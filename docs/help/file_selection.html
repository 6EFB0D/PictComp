<h2>ファイル選択とサムネイル</h2>
<p><strong>一覧</strong>: ファイル名リスト。Ctrl+クリックで複数選択。</p>
<p><strong>サムネイル</strong>: 画像をクリックして選択。青枠と「選択」バッジで表示。</p>
<p><strong>全選択</strong> / <strong>選択解除</strong>: 一括操作。</p>
<p>未選択時は全ファイルが処理対象です。</p>
