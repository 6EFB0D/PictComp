<div class="content">
<h2>一括処理</h2>
<h3>メイン画面</h3>
<ul>
<li>ファイル日時を一括更新</li>
<li>ファイル名を一括変更（Pro版・準備中）</li>
</ul>
<h3>撮影情報ウィンドウ</h3>
<ul>
<li>表示中の全ファイルに日時を一括更新</li>
<li>表示中の全ファイルの名前を一括変更（Pro版・準備中）</li>
</ul>
<h3>画像ビューア</h3>
<ul>
<li>ファイル日時を一括更新</li>
</ul>
<p>撮影日時があるファイルのみが処理されます。</p>
