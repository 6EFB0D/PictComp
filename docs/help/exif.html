<h2>撮影情報（EXIF）</h2>
<p>ダブルクリックまたは「撮影情報を表示」で開きます。前へ・次へで画像を切り替えられます。</p>
<h3>このファイルのみ</h3>
<ul>
<li>ファイル日時を更新</li>
<li>ファイル名を変更（Pro版・準備中）</li>
</ul>
<h3>一括</h3>
<ul>
<li>表示中の全ファイルに日時を一括更新</li>
<li>表示中の全ファイルの名前を一括変更（Pro版・準備中）</li>
</ul>
<p>Web公開時はEXIF削除を推奨します。</p>
